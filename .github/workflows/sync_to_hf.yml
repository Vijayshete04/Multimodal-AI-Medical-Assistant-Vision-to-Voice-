name: Sync and Keep Alive

on:
  push:
    branches: [main]
  # --- ADDED THIS SECTION ---
  schedule:
    - cron: '0 0 * * *'  # Runs every 24 hours at midnight UTC
  # --------------------------
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub and Wake Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Syncs the code
          git push --force https://Vijayshete04:$HF_TOKEN@huggingface.co/spaces/Vijayshete04/Multimodal-AI-Medical-Assistant main
          
          # Explicitly pings the Space to ensure it is awake
          curl -I -L https://huggingface.co/spaces/Vijayshete04/Multimodal-AI-Medical-Assistant